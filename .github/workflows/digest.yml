name: Daily Digest Generation

on:
  schedule:
    - cron: "0 6 * * *" # Every day at 6 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-digest:
    name: Generate Daily Digest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate weekly digest
        run: node scripts/generate-digest.js

      - name: Generate RSS feeds
        run: |
          if [ -f scripts/generate-feeds.js ]; then
            node scripts/generate-feeds.js
          else
            echo "No feed generator found, skipping RSS generation"
          fi

      - name: Create PR with changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          YEAR=$(date -u +%Y)
          WEEK=$(date -u +%V)
          DAY=$(date -u +%Y-%m-%d)
          BRANCH="digest/${DAY}"

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git checkout -b "$BRANCH"
          git commit -m "chore: generate daily digest for ${DAY}"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore: daily digest ${DAY}" \
            --body "Automated daily digest generation for ${DAY} (${YEAR}-W${WEEK})." \
            --base main \
            --head "$BRANCH"

          # Enable auto-merge (squash) — merges once required checks pass
          PR_NUMBER=$(gh pr view "$BRANCH" --json number --jq '.number')
          gh pr merge "$PR_NUMBER" --auto --squash --delete-branch
        env:
          GH_TOKEN: ${{ github.token }}
